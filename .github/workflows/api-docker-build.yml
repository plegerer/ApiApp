name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # API IMAGE
      # =========================
      - name: Extract metadata (API)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/apiapp

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./ApiApp
          file: ./ApiApp/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      # =========================
      # WORKER IMAGE
      # =========================
      - name: Extract metadata (Worker)
        id: meta_worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/worker

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./WorkerApp
          file: ./WorkerApp/Dockerfile
          push: true
          tags: ${{ steps.meta_worker.outputs.tags }}
          labels: ${{ steps.meta_worker.outputs.labels }}